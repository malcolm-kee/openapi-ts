openapi: 3.1.0
info:
  title: Faker M4 property name inference test
  version: '1'
paths: {}
components:
  schemas:
    # --- Standalone property name inference ---
    PersonProfile:
      type: object
      properties:
        firstName:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        age:
          type: integer
        city:
          type: string
        postalCode:
          type: string
        bio:
          type: string
        # format should take priority over name
        website:
          type: string
          format: uri
        # pattern should take priority over name
        zipCode:
          type: string
          pattern: '^\d{5}$'
        # name inference takes priority over length constraints
        username:
          type: string
          minLength: 3
          maxLength: 20
        # plain string with no matching name — should use fallback
        someRandomField:
          type: string
      required:
        - firstName
        - last_name
        - email
        - phone
        - age
        - city
        - postalCode
        - bio
        - website
        - zipCode
        - username
        - someRandomField

    # --- Number constraint merging with name defaults ---
    PersonWithConstraints:
      type: object
      properties:
        # name rule provides {min:1, max:120}, schema overrides min
        age:
          type: integer
          minimum: 18
        # name rule provides {min:1, max:120}, schema overrides both
        seniorAge:
          type: integer
          minimum: 65
          maximum: 100
      required:
        - age

    # --- Ancestor-aware inference ---
    # "name" alone is ambiguous, but parent context disambiguates

    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - name
        - email

    Company:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    # "name" with no meaningful parent context — should use fallback
    Config:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    # --- String id / _id → faker.string.uuid() ---
    Document:
      type: object
      properties:
        id:
          type: string
        _id:
          type: string
        # integer id should NOT use uuid — stays as faker.number.int()
        numericId:
          type: integer
      required:
        - id
        - _id
        - numericId
