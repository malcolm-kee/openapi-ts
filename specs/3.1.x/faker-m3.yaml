openapi: 3.1.0
info:
  title: Faker M3 composition test
  version: '1'
paths: {}
components:
  schemas:
    # --- Base schemas for composition ---
    Pet:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
      required:
        - name
        - age
    Tag:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
      required:
        - id
        - label

    # --- oneOf union (random selection) ---
    PetOrTag:
      oneOf:
        - $ref: '#/components/schemas/Pet'
        - $ref: '#/components/schemas/Tag'

    # --- anyOf union (inline types) ---
    StringOrNumber:
      anyOf:
        - type: string
        - type: number

    # --- Nullable union with multiple non-null variants ---
    NullablePetOrTag:
      oneOf:
        - $ref: '#/components/schemas/Pet'
        - $ref: '#/components/schemas/Tag'
        - type: 'null'

    # --- allOf intersection (object merging) ---
    PetWithOwner:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          properties:
            owner:
              type: string
          required:
            - owner

    # --- Discriminated oneOf ---
    Circle:
      type: object
      properties:
        kind:
          type: string
        radius:
          type: number
      required:
        - kind
        - radius
    Square:
      type: object
      properties:
        kind:
          type: string
        side:
          type: number
      required:
        - kind
        - side
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Circle'
        - $ref: '#/components/schemas/Square'
      discriminator:
        propertyName: kind

    # --- Discriminated oneOf with explicit mapping ---
    Dog:
      type: object
      properties:
        type:
          type: string
        bark:
          type: boolean
      required:
        - type
        - bark
    Cat:
      type: object
      properties:
        type:
          type: string
        purr:
          type: boolean
      required:
        - type
        - purr
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Cat'
      discriminator:
        propertyName: type
        mapping:
          dog: '#/components/schemas/Dog'
          cat: '#/components/schemas/Cat'
