openapi: 3.1.0
info:
  title: Faker M5 — per-operation response factories
  version: '1'
paths:
  /pets:
    get:
      operationId: listPets
      summary: Single useful 2XX (array) → no suffix
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      summary: Single useful 2XX after void filter → no suffix
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '204':
          description: No content
  /pets/{id}:
    get:
      operationId: getPet
      summary: Multiple useful (200 + 404) → suffix
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deletePet
      summary: Single useful non-2XX → suffix
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /jobs:
    post:
      operationId: createJob
      summary: Wildcard 2XX + wildcard error → suffix with wildcard codes
      responses:
        '2XX':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '4XX':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /health:
    get:
      operationId: healthCheck
      summary: Single useful 2XX (inline string) → no suffix
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        age:
          type: integer
      required:
        - id
        - name
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message
